<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MindCare Register or Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth.js"></script>

    <style>
        /* Background for Registration Page */
        #registrationPage {
            position: relative;
            min-height: 100vh;
            background-attachment: fixed;
        }

        #registrationPage::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('assets/health1.jpg'); /* Ensure this path is correct */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px) brightness(0.8);
            z-index: 0;
        }

        #registrationPage::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.4), rgba(59, 130, 246, 0.4));
            z-index: 0;
        }

        .content-container {
            position: relative;
            z-index: 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        /* Transition utility */
        .hidden { display: none; }
        .block { display: block; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <script>
        // SINGLE SOURCE OF TRUTH: Check for the standardized key
        const existingUser = localStorage.getItem('mindcare_current_user');
        if (existingUser) {
            try {
                const userObj = JSON.parse(existingUser);
                if (userObj && userObj.id) {
                    // User is valid, redirect to dashboard
                    window.location.href = 'index.html';
                }
            } catch (e) {
                console.error("Session corrupted, clearing...", e);
                localStorage.removeItem('mindcare_current_user');
            }
        }
    </script>

    <div id="registrationPage" class="flex items-center justify-center p-4">
        <div class="content-container w-full max-w-md">
            
            <div id="loginPage" class="glass-panel rounded-3xl shadow-2xl overflow-hidden active">
                <div class="p-8 sm:p-10">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-purple-100 text-purple-600 mb-4 shadow-inner">
                            <i class="fas fa-brain text-3xl"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Welcome Back</h2>
                        <p class="text-gray-500 mt-2">Sign in to continue your journey</p>
                    </div>

                    <div id="loginStatus" class="hidden mb-4 p-3 rounded-lg bg-red-100 text-red-700 text-sm text-center">
                        <span id="loginStatusText"></span>
                    </div>

                    <form id="loginForm" onsubmit="handleGmailLogin(event)" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Email Address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-envelope text-gray-400"></i>
                                </div>
                                <input type="email" id="gmail" required 
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all bg-gray-50/50" 
                                    placeholder="you@example.com">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input type="password" id="password" required 
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all bg-gray-50/50" 
                                    placeholder="password">
                            </div>
                        </div>

                        <div class="flex items-center justify-between text-sm">
                            <label class="flex items-center">
                                <input type="checkbox" id="rememberMe" class="rounded text-purple-600 focus:ring-purple-500 border-gray-300">
                                <span class="ml-2 text-gray-600">Remember me</span>
                            </label>
                            <a href="#" class="font-medium text-purple-600 hover:text-purple-500">Forgot password?</a>
                        </div>

                        <button type="submit" 
                            class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-all transform hover:-translate-y-0.5">
                            Sign In
                        </button>
                    </form>

                    <div class="mt-8 text-center">
                        <p class="text-gray-600 text-sm">
                            Don't have an account? 
                            <button onclick="showRegistrationPage()" class="font-bold text-purple-600 hover:text-purple-500 transition-colors">
                                Create Account
                            </button>
                        </p>
                    </div>
                </div>
            </div>

            <div id="registrationPageContent" class="glass-panel rounded-3xl shadow-2xl overflow-hidden hidden">
                <div class="p-8 sm:p-10">
                    <div class="text-center mb-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4 shadow-inner">
                            <i class="fas fa-user-plus text-3xl"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Create Account</h2>
                        <p class="text-gray-500 mt-2">Join MindCare today</p>
                    </div>

                    <div id="registrationStatus" class="hidden mb-4 p-3 rounded-lg bg-red-100 text-red-700 text-sm text-center">
                        <span id="registrationStatusText"></span>
                    </div>

                    <form id="registrationForm" onsubmit="handleRegistration(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Full Name</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-user text-gray-400"></i>
                                </div>
                                <input type="text" id="regName" required 
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50/50" 
                                    placeholder="Your Name">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Email Address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-envelope text-gray-400"></i>
                                </div>
                                <input type="email" id="regGmail" required 
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50/50" 
                                    placeholder="you@example.com">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input type="password" id="regPassword" required 
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50/50" 
                                    placeholder="Create a password">
                            </div>
                            <div class="w-full h-1 mt-2 bg-gray-200 rounded-full overflow-hidden">
                                <div id="passwordStrengthBar" class="h-full bg-red-500 w-0 transition-all duration-300"></div>
                            </div>
                            <p id="passwordStrengthText" class="text-xs text-right mt-1 text-gray-500">Weak</p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 ml-1">Confirm Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-check-circle text-gray-400"></i>
                                </div>
                                <input type="password" id="regConfirmPassword" required 
                                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50/50" 
                                    placeholder="Confirm password">
                            </div>
                        </div>

                        <button type="submit" 
                            class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all transform hover:-translate-y-0.5">
                            Create Account
                        </button>
                    </form>

                    <div class="mt-8 text-center">
                        <p class="text-gray-600 text-sm">
                            Already have an account? 
                            <button onclick="showLoginPage()" class="font-bold text-blue-600 hover:text-blue-500 transition-colors">
                                Sign In
                            </button>
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Toggle between Login and Registration views
        function showRegistrationPage() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('active');
            
            document.getElementById('registrationPageContent').classList.remove('hidden');
            document.getElementById('registrationPageContent').classList.add('active');
        }

        function showLoginPage() {
            document.getElementById('registrationPageContent').classList.add('hidden');
            document.getElementById('registrationPageContent').classList.remove('active');
            
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('loginPage').classList.add('active');
        }

        // Simple Password Strength Meter
        const regPasswordInput = document.getElementById('regPassword');
        const strengthBar = document.getElementById('passwordStrengthBar');
        const strengthText = document.getElementById('passwordStrengthText');

        if(regPasswordInput) {
            regPasswordInput.addEventListener('input', function() {
                const val = this.value;
                let strength = 0;
                if(val.length > 5) strength += 20;
                if(val.length > 8) strength += 20;
                if(/[A-Z]/.test(val)) strength += 20;
                if(/[0-9]/.test(val)) strength += 20;
                if(/[^A-Za-z0-9]/.test(val)) strength += 20;

                strengthBar.style.width = strength + '%';
                
                if(strength < 40) {
                    strengthBar.className = 'h-full bg-red-500 w-0 transition-all duration-300';
                    strengthText.innerText = "Weak";
                } else if(strength < 80) {
                    strengthBar.className = 'h-full bg-yellow-500 w-0 transition-all duration-300';
                    strengthText.innerText = "Medium";
                } else {
                    strengthBar.className = 'h-full bg-green-500 w-0 transition-all duration-300';
                    strengthText.innerText = "Strong";
                }
            });
        }
    </script>
</body>
</html>
